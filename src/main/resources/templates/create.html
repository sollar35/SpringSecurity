<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>New User</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="page-header">
        <div>
            <h1 class="page-title">Create User</h1>
            <p class="page-subtitle">Add a new user to the system.</p>
        </div>
        <a class="btn btn-secondary" th:href="@{/admin}">Back</a>
    </div>

    <div class="card">
        <form th:action="@{/admin/save}" th:object="${user}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label>Username</label>
                <input class="input" type="text" th:field="*{username}">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input class="input" type="password" th:field="*{password}">
            </div>

            <div class="form-group">
                <label>First name</label>
                <input class="input" type="text" th:field="*{firstName}">
            </div>

            <div class="form-group">
                <label>Last name</label>
                <input class="input" type="text" th:field="*{lastName}">
            </div>

            <div class="form-group">
                <label>Age</label>
                <input class="input" type="number" th:field="*{age}">
            </div>



            <div class="form-actions">
                <button class="btn btn-primary" type="submit">Create</button>
                <a class="btn btn-secondary" th:href="@{/admin}">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
