<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
<div class="auth-wrap">
    <div class="card shadow-sm p-4 auth-card">
        <h1 class="fw-bold mb-2">Login</h1>
        <p class="text-muted">Enter your username and password.</p>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" type="text" name="username" placeholder="Enter Username" autocomplete="username">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" placeholder="Enter Password" autocomplete="current-password">
            </div>

            <button class="btn btn-primary w-100" type="submit">Login</button>

            <div class="alert alert-danger mt-3"
                 th:if="${param.error}">
                Invalid username or password.
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
