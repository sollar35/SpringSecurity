<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="page-header">
        <div>
            <h1 class="page-title">Edit User</h1>
            <p class="page-subtitle">Update user data.</p>
        </div>
        <a class="btn btn-secondary" th:href="@{/admin}">Back</a>
    </div>

    <div class="card">
        <form th:action="@{/admin/save}" th:object="${userForm}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label>Username</label>
                <input class="input" type="text" th:field="*{username}">
            </div>

            <div class="form-group">
                <label>New password</label>
                <input class="input" type="password" name="newPassword" placeholder="Leave empty to keep current password">
            </div>

            <div class="form-group">
                <label>First name</label>
                <input class="input" type="text" th:field="*{firstName}">
            </div>

            <div class="form-group">
                <label>Last name</label>
                <input class="input" type="text" th:field="*{lastName}">
            </div>

            <div class="form-group">
                <label>Age</label>
                <input class="input" type="number" th:field="*{age}" required>
                <div class="error" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
            </div>

            <div class="form-group">
                <label>Roles</label>

                <div th:each="role : ${allRoles}">
                    <label style="display:block; margin-bottom:6px;">
                        <input type="checkbox"
                               name="roleIds"
                               th:value="${role.id}"
                               th:checked="${userForm.roleIds != null and userForm.roleIds.contains(role.id)}">
                        <span th:text="${role.name}"></span>
                    </label>
                </div>

                <div class="error"
                     th:if="${#fields.hasErrors('roleIds')}"
                     th:errors="*{roleIds}">
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" type="submit">Save</button>
                <a class="btn btn-secondary" th:href="@{/admin}">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
