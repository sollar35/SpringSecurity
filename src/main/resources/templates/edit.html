<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">Edit User</h1>
            <p class="text-muted">Update user data.</p>
        </div>
        <a class="btn btn-secondary" th:href="@{/admin}">Back</a>
    </div>

    <div class="card shadow-sm p-4">
        <form th:action="@{/admin/save}" th:object="${userForm}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" type="text" th:field="*{username}">
            </div>

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input class="form-control" type="password" name="newPassword" placeholder="Leave empty to keep current password">
            </div>

            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input class="form-control" type="text" th:field="*{firstName}">
            </div>

            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input class="form-control" type="text" th:field="*{lastName}">
            </div>

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input class="form-control" type="number" th:field="*{age}" required>
                <div class="text-danger" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Roles</label>

                <div th:each="role : ${allRoles}" class="form-check mb-2">

                    <input class="form-check-input"
                           type="checkbox"
                           name="roleIds"
                           th:value="${role.id}"
                           th:checked="${userForm.roleIds != null and userForm.roleIds.contains(role.id)}">

                    <label class="form-check-label"
                           th:text="${role.name}">
                    </label>

                </div>

                <div class="text-danger"
                     th:if="${#fields.hasErrors('roleIds')}"
                     th:errors="*{roleIds}">
                </div>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit">Save</button>
                <a class="btn btn-secondary" th:href="@{/admin}">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
