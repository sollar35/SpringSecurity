<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">Edit Profile</h1>
            <p class="text-muted">Change only your own data.</p>
        </div>

        <div class="actions">
            <a class="btn btn-secondary" th:href="@{/user}">Back</a>
        </div>
    </div>

    <div class="card shadow-sm p-4">
        <form th:action="@{/user/edit}" th:object="${userProfileForm}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="mb-3">
                <label class="form-label" for="firstName">First name</label>
                <input id="firstName" class="form-control" type="text" th:field="*{firstName}">
                <div class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="lastName">Last name</label>
                <input id="lastName" class="form-control" type="text" th:field="*{lastName}">
                <div class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="age">Age</label>
                <input id="age" class="form-control" type="number" th:field="*{age}">
                <div class="text-danger" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="newPassword">New password</label>
                <input id="newPassword" class="form-control" type="password" th:field="*{newPassword}"
                       autocomplete="new-password" placeholder="Leave empty to keep current password">
                <div class="text-danger" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit">Save</button>
                <a class="btn btn-secondary" th:href="@{/user}">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
