<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="page-header">
        <div>
            <h1 class="page-title">Admin Panel</h1>
            <p class="small">Вы вошли как: <strong th:text="${currentUsername}"></strong></p>
            <p class="page-subtitle">Manage users, edit them, or delete them. Human civilization finally found a use for tables.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/admin/new}">Add New User</a>
    </div>

    <div class="card table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>First name</th>
                <th>Last name</th>
                <th>Age</th>
                <th>Roles</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.username}"></td>
                <td th:text="${u.firstName}"></td>
                <td th:text="${u.lastName}"></td>
                <td th:text="${u.age}"></td>
                <td>
                    <span class="badge" th:each="r : ${u.roles}" th:text="${r.name}"></span>
                </td>
                <td>
                    <div class="actions">
                        <a class="btn btn-secondary btn-sm" th:href="@{/admin/edit(id=${u.id})}">Edit</a>
                        <a class="btn btn-danger btn-sm" th:href="@{/admin/delete(id=${u.id})}">Delete</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <br>
    <form th:action="@{/logout}" method="post">
        <button class="logout-btn" type="submit">Logout</button>
    </form>
</div>
</body>
</html>
