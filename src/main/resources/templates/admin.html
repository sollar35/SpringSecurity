<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">Admin Panel</h1>
            <p class="small">Вы вошли как: <strong th:text="${currentUsername}"></strong></p>
            <p class="text-muted">Manage users, edit them, or delete them. Human civilization finally found a use for tables.</p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-secondary" th:href="@{/user}">My Profile</a>
            <a class="btn btn-primary" th:href="@{/admin/new}">Add New User</a>
        </div>
    </div>

    <div class="card shadow-sm p-4">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>First name</th>
                    <th>Last name</th>
                    <th>Age</th>
                    <th>Roles</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.firstName}"></td>
                    <td th:text="${u.lastName}"></td>
                    <td th:text="${u.age}"></td>
                    <td>
                        <span class="badge rounded-pill bg-secondary text-white me-1"
                              th:each="r : ${u.roles}"
                              th:text="${r.name}">
                        </span>
                    </td>
                    <td>
                        <div class="d-flex gap-2">

                            <a class="btn btn-secondary btn-sm"
                               th:href="@{/admin/edit(id=${u.id})}">
                                Edit
                            </a>

                            <form th:action="@{/admin/delete}" method="post">

                                <input type="hidden"
                                       name="id"
                                       th:value="${u.id}">

                                <button class="btn btn-danger btn-sm"
                                        type="submit">
                                    Delete
                                </button>

                            </form>

                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <br>
    <form th:action="@{/logout}" method="post">
        <button class="btn btn-danger" type="submit">
            Logout
        </button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
